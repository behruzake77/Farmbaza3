<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Admin — {{ site_name }}{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Sidebar overlay (mobil) -->
<div class="admin-sidebar-overlay" id="sidebar-overlay"></div>

<div class="admin-shell">
  <aside class="admin-sidebar" id="admin-sidebar">
    <a href="/" class="brand">
      <span class="brand-mark">Rx</span>
      <span>{{ site_name }}</span>
    </a>

    <span class="admin-nav-label">Asosiy</span>
    <a href="/admin" class="admin-link {% if request.url.path == '/admin' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>

    <span class="admin-nav-label">Katalog</span>
    <a href="/admin/dorilar" class="admin-link {% if '/admin/dorilar' in request.url.path %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3H5a2 2 0 0 0-2 2v4m6-6h10a2 2 0 0 1 2 2v4M9 3v18m0 0h10a2 2 0 0 0 2-2V9M9 21H5a2 2 0 0 1-2-2V9m0 0h18"/></svg>
      Dorilar
    </a>
    <a href="/admin/kategoriyalar" class="admin-link {% if '/admin/kategoriyalar' in request.url.path %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      Kategoriyalar
    </a>

    <span class="admin-nav-label">Boshqaruv</span>
    <a href="/admin/sozlamalar" class="admin-link {% if '/admin/sozlamalar' in request.url.path %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Sozlamalar
    </a>

    <div class="spacer"></div>

    <a href="/" class="admin-link" target="_blank">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Saytni ko'rish
    </a>
    <a href="/admin/logout" class="admin-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Chiqish
    </a>
  </aside>

  <main class="admin-main">
    <div class="admin-topbar">
      <button class="admin-burger" id="admin-burger" aria-label="Menyu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      {% block topbar %}
      <h1>{% block page_title %}Admin{% endblock %}</h1>
      <div style="display:flex;gap:10px;align-items:center;">{% block topbar_actions %}{% endblock %}</div>
      {% endblock %}
    </div>

    <div class="admin-content">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>

<script src="/static/js/admin.js"></script>
<script>
(function(){
  const burger = document.getElementById('admin-burger');
  const sidebar = document.getElementById('admin-sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  if(!burger) return;
  function open(){ sidebar.classList.add('open'); overlay.classList.add('open'); document.body.style.overflow='hidden'; }
  function close(){ sidebar.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow=''; }
  burger.addEventListener('click', ()=> sidebar.classList.contains('open') ? close() : open());
  overlay.addEventListener('click', close);
})();
</script>
</body>
</html>
